<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AskData AI</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.container {
    width: 450px;
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
}
input, button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
}
button {
    background: #10b981;
    border: none;
    color: white;
}
.chat {
    margin-top: 15px;
    max-height: 300px;
    overflow-y: auto;
    background: black;
    padding: 10px;
}
.msg {
    margin-bottom: 10px;
    padding: 8px;
    border-radius: 8px;
}
.user { background: #1d4ed8; }
.bot { background: #065f46; }

table {
    width: 100%;
    border-collapse: collapse;
}
td, th {
    border: 1px solid #555;
    padding: 5px;
}
</style>
</head>

<body>

<div class="container">
    <h2>🤖 AskData AI</h2>

    <input type="file" id="file">
    <input type="text" id="question" placeholder="Ask your question">
    <button onclick="ask()">Ask</button>

    <div class="chat" id="chat"></div>
</div>

<script>
async function ask() {
    const file = document.getElementById("file").files[0];
    const question = document.getElementById("question").value;

    addMessage(question, "user");

    let formData = new FormData();
    formData.append("question", question);
    if (file) formData.append("file", file);

    let res = await fetch("https://askdata-ai-production.up.railway.app/ask", {
        method: "POST",
        body: formData
    });

    let data = await res.json();
    renderAnswer(data.answer);
}

function addMessage(text, type) {
    let chat = document.getElementById("chat");
    let div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;
    chat.appendChild(div);
}

function renderAnswer(answer) {
    let chat = document.getElementById("chat");
    let div = document.createElement("div");
    div.className = "msg bot";

    if (Array.isArray(answer)) {
        div.innerHTML = table(answer);
    } else {
        div.innerText = answer;
    }

    chat.appendChild(div);
}

function table(data) {
    let keys = Object.keys(data[0]);
    let html = "<table><tr>";
    keys.forEach(k => html += `<th>${k}</th>`);
    html += "</tr>";

    data.forEach(r => {
        html += "<tr>";
        keys.forEach(k => html += `<td>${r[k]}</td>`);
        html += "</tr>";
    });

    return html + "</table>";
}

// 🔥 LOAD HISTORY
async function loadHistory() {
    let res = await fetch("https://askdata-ai-production.up.railway.app/history");
    let data = await res.json();

    data.forEach(item => {
        addMessage(item.question, "user");

        try {
            let parsed = JSON.parse(item.answer);

            if (Array.isArray(parsed)) {
                renderAnswer(parsed);
            } else {
                addMessage(parsed, "bot");
            }
        } catch {
            addMessage(item.answer, "bot");
        }
    });
}

window.onload = loadHistory;
</script>

</body>
</html>
